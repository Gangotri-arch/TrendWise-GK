<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Art & Culture Quiz</title>

<style>
body{font-family:Arial;background:#f4f4f4;padding:20px}
.box{max-width:700px;margin:auto;background:white;padding:20px;border-radius:10px}
#q{font-size:22px;font-weight:bold;margin-bottom:15px}
.option{display:block;width:100%;margin:8px 0;padding:10px;background:#eee;border:none;border-radius:6px;cursor:pointer}
.option:hover{background:#ddd}
.selected{background:skyblue}
button{padding:10px 15px;margin:5px;border:none;border-radius:6px;cursor:pointer}
#result{margin-top:20px;font-size:22px;font-weight:bold}
</style>

</head>

<body>

<div class="box">

<h2>Art & Culture Quiz</h2>

<div id="q">Loading...</div>
<div id="options"></div>

<button onclick="prev()">Previous</button>
<button onclick="next()">Next</button>
<button onclick="submitQuiz()">Submit</button>

<div id="result"></div>

</div>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTnrbtJ8lD8k8Unj8NULCyWC6Ov8uJ6OdM-L7LtlFS_y-qvDhc5Kr04y7u4RFug48xQzQ9gIyXA2oxc/pub?output=csv";

let data = [];
let index = 0;
let answers = [];

async function load(){
  try{
    let res = await fetch(url);
    let text = await res.text();

    let rows = text.trim().split("\n").slice(1);

    data = rows.map(r=>{
      let c = r.split(",");
      return {
        q:c[0],
        options:[c[1],c[2],c[3],c[4]],
        answer:c[5]
      }
    });

    show();
  }catch(e){
    document.getElementById("q").innerText="Failed to load questions";
    console.log(e);
  }
}

function show(){
  let q = data[index];
  document.getElementById("q").innerText = q.q;

  let op = document.getElementById("options");
  op.innerHTML="";

  q.options.forEach(o=>{
    let b = document.createElement("button");
    b.innerText=o;
    b.className="option";

    if(answers[index]==o) b.classList.add("selected");

    b.onclick=()=>{
      answers[index]=o;
      show();
    }

    op.appendChild(b);
  });
}

function next(){ if(index<data.length-1){index++;show();} }
function prev(){ if(index>0){index--;show();} }

function submitQuiz(){
  let score=0;
  data.forEach((q,i)=>{
    if(answers[i]==q.answer) score++;
  });

  document.getElementById("result").innerText =
  "Score: "+score+"/"+data.length;
}

load();

</script>

</body>
</html>
