<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Quiz Website</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial, sans-serif;
            background:#f4f4f4;
            text-align:center;
        }

        /* Language Button */

        #langBtn{
            position:absolute;
            top:20px;
            right:20px;
            padding:10px 20px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        #langBtn:hover{
            background:#0056b3;
        }

        /* Main Section */

        .container{
            margin-top:100px;
            padding:20px;
        }

        h1{
            color:#222;
            font-size:40px;
        }

        p{
            color:#555;
            font-size:20px;
        }

        /* Buttons */

        .btn{
            display:inline-block;
            margin:15px;
            padding:15px 30px;
            background:#28a745;
            color:white;
            text-decoration:none;
            border-radius:10px;
            font-size:20px;
            transition:0.3s;
        }

        .btn:hover{
            background:#1e7e34;
        }

    </style>
</head>

<body>

    <!-- Language Button -->

    <button onclick="toggleLanguage()" id="langBtn">
        हिन्दी
    </button>

    <!-- Main Content -->

    <div class="container">

        <h1 id="title">
            Welcome to My Quiz Website
        </h1>

        <p id="desc">
            Start your preparation with quizzes and notes.
        </p>

        <!-- Quiz Buttons -->

        <a href="maths.html" class="btn" id="mathBtn">
            Maths Quiz
        </a>

        <a href="reasoning.html" class="btn" id="reasonBtn">
            Reasoning Quiz
        </a>

        <a href="art-culture.html" class="btn" id="artBtn">
            Art & Culture Quiz
        </a>

    </div>

    <!-- JavaScript -->

    <script>

        let currentLanguage = "en";

        function toggleLanguage(){

            if(currentLanguage === "en"){

                document.getElementById("title").innerText =
                    "मेरी क्विज वेबसाइट में आपका स्वागत है";

                document.getElementById("desc").innerText =
                    "क्विज़ और नोट्स के साथ अपनी तैयारी शुरू करें।";

                document.getElementById("mathBtn").innerText =
                    "गणित क्विज";

                document.getElementById("reasonBtn").innerText =
                    "रीजनिंग क्विज";

                document.getElementById("artBtn").innerText =
                    "कला एवं संस्कृति क्विज";

                document.getElementById("langBtn").innerText =
                    "English";

                currentLanguage = "hi";

            } else {

                document.getElementById("title").innerText =
                    "Welcome to My Quiz Website";

                document.getElementById("desc").innerText =
                    "Start your preparation with quizzes and notes.";

                document.getElementById("mathBtn").innerText =
                    "Maths Quiz";

                document.getElementById("reasonBtn").innerText =
                    "Reasoning Quiz";

                document.getElementById("artBtn").innerText =
                    "Art & Culture Quiz";

                document.getElementById("langBtn").innerText =
                    "हिन्दी";

                currentLanguage = "en";
            }
        }

    </script>

</body>
</html>
