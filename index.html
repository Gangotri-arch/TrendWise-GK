<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quiz Website</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial;
    background:#f2f2f2;
    text-align:center;
}

/* Language Button */

#langBtn{
    position:fixed;
    top:20px;
    right:20px;
    padding:12px 20px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

/* Main Content */

.container{
    margin-top:120px;
}

h1{
    font-size:40px;
    color:#222;
}

p{
    font-size:20px;
    color:#555;
}

.btn{
    display:inline-block;
    margin:15px;
    padding:15px 25px;
    background:green;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-size:20px;
}

</style>

</head>

<body>

<!-- Language Button -->

<button id="langBtn" onclick="toggleLanguage()">
हिन्दी
</button>

<div class="container">

<h1 id="title">
Welcome to My Quiz Website
</h1>

<p id="desc">
Start your preparation with quizzes and notes.
</p>

<a href="maths.html" class="btn" id="mathBtn">
Maths Quiz
</a>

<a href="reasoning.html" class="btn" id="reasonBtn">
Reasoning Quiz
</a>

<a href="art-culture.html" class="btn" id="artBtn">
Art & Culture Quiz
</a>

</div>

<script>

let currentLanguage = "en";

function toggleLanguage(){

    if(currentLanguage === "en"){

        document.getElementById("title").innerText =
        "मेरी क्विज वेबसाइट में आपका स्वागत है";

        document.getElementById("desc").innerText =
        "क्विज और नोट्स के साथ तैयारी शुरू करें";

        document.getElementById("mathBtn").innerText =
        "गणित क्विज";

        document.getElementById("reasonBtn").innerText =
        "रीजनिंग क्विज";

        document.getElementById("artBtn").innerText =
        "कला एवं संस्कृति क्विज";

        document.getElementById("langBtn").innerText =
        "English";

        currentLanguage = "hi";

    }

    else{

        document.getElementById("title").innerText =
        "Welcome to My Quiz Website";

        document.getElementById("desc").innerText =
        "Start your preparation with quizzes and notes.";

        document.getElementById("mathBtn").innerText =
        "Maths Quiz";

        document.getElementById("reasonBtn").innerText =
        "Reasoning Quiz";

        document.getElementById("artBtn").innerText =
        "Art & Culture Quiz";

        document.getElementById("langBtn").innerText =
        "हिन्दी";

        currentLanguage = "en";
    }

}

</script>

</body>
</html>
