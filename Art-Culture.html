<!DOCTYPE html>
<html>
<head>
  <title>Art Culture Quiz</title>

  <style>

    body{
      font-family:Arial;
      background:#f2f2f2;
      padding:20px;
    }

    .quiz-box{
      max-width:700px;
      margin:auto;
      background:white;
      padding:20px;
      border-radius:10px;
    }

    #question{
      font-size:24px;
      font-weight:bold;
      margin-bottom:20px;
    }

    .option{
      display:block;
      width:100%;
      margin:10px 0;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#e0e0e0;
      cursor:pointer;
      text-align:left;
      font-size:16px;
    }

    .selected{
      background:skyblue !important;
    }

    button{
      padding:10px 15px;
      margin:5px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      color:white;
      font-size:16px;
    }

    .next{
      background:green;
    }

    .prev{
      background:blue;
    }

    .submit{
      background:red;
    }

    #result{
      margin-top:20px;
      font-size:28px;
      font-weight:bold;
      text-align:center;
    }

  </style>

</head>

<body>

<div class="quiz-box">

  <h1>Art & Culture Quiz</h1>

  <div id="question">Loading Questions...</div>

  <div id="options"></div>

  <button class="prev" onclick="prevQuestion()">
    Previous
  </button>

  <button class="next" onclick="nextQuestion()">
    Next
  </button>

  <button class="submit" onclick="submitQuiz()">
    Submit
  </button>

  <div id="result"></div>

</div>

<script>

const csvUrl =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTnrbtJ8lD8k8Unj8NULCyWC6Ov8uJ6OdM-L7LtlFS_y-qvDhc5Kr04y7u4RFug48xQzQ9gIyXA2oxc/pub?output=csv";

let questions = [];

let currentQuestion = 0;

let answers = [];

async function loadQuiz(){

  try{

    const response = await fetch(csvUrl);

    const data = await response.text();

    const rows = data.trim().split("\n").slice(1);

    questions = rows.map(row => {

      const cols = row.split(",");

      return {

        question: cols[0],

        options: [

          cols[1],
          cols[2],
          cols[3],
          cols[4]

        ],

        answer: cols[5]

      };

    });

    showQuestion();

  }

  catch(error){

    document.getElementById("question")
    .innerText = "Failed To Load Questions";

    console.log(error);

  }

}

function showQuestion(){

  const q = questions[currentQuestion];

  if(!q){

    document.getElementById("question")
    .innerText = "No Questions Found";

    return;

  }

  document.getElementById("question")
  .innerText = q.question;

  const optionsDiv =
  document.getElementById("options");

  optionsDiv.innerHTML = "";

  q.options.forEach(option => {

    const btn =
    document.createElement("button");

    btn.className = "option";

    btn.innerText = option;

    if(answers[currentQuestion] === option){

      btn.classList.add("selected");

    }

    btn.onclick = () => {

      answers[currentQuestion] = option;

      showQuestion();

    };

    optionsDiv.appendChild(btn);

  });

}

function nextQuestion(){

  if(currentQuestion < questions.length - 1){

    currentQuestion++;

    showQuestion();

  }

}

function prevQuestion(){

  if(currentQuestion > 0){

    currentQuestion--;

    showQuestion();

  }

}

function submitQuiz(){

  let score = 0;

  questions.forEach((q,index)=>{

    if(answers[index] === q.answer){

      score++;

    }

  });

  document.getElementById("result")
  .innerText =
  "Your Score: " + score + "/" + questions.length;

}

loadQuiz();

</script>

</body>
</html>
