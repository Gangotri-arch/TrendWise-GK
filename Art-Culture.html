<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Art & Culture Quiz</title>

<style>

body{
  font-family:Arial;
  background:#f2f2f2;
  padding:20px;
}

.quiz-box{
  max-width:700px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:10px;
}

#question{
  font-size:24px;
  font-weight:bold;
  margin-bottom:20px;
}

.option{
  display:block;
  width:100%;
  margin:10px 0;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#e0e0e0;
  cursor:pointer;
  text-align:left;
  font-size:16px;
}

.option:hover{
  background:#d0d0d0;
}

.selected{
  background:skyblue !important;
}

button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  color:white;
  font-size:16px;
}

.next{
  background:green;
}

.prev{
  background:blue;
}

.submit{
  background:red;
}

#result{
  margin-top:20px;
  font-size:28px;
  font-weight:bold;
  text-align:center;
}

</style>

</head>

<body>

<div class="quiz-box">

<h1>Art & Culture Quiz</h1>

<div id="question"></div>

<div id="options"></div>

<button class="prev" onclick="prevQuestion()">
Previous
</button>

<button class="next" onclick="nextQuestion()">
Next
</button>

<button class="submit" onclick="submitQuiz()">
Submit
</button>

<div id="result"></div>

</div>

<script>

const questions = [

{
question:"Who built Taj Mahal?",
options:["Akbar","Shah Jahan","Humayun","Aurangzeb"],
answer:"Shah Jahan"
},

{
question:"Which dance belongs to Kerala?",
options:["Bharatanatyam","Kathak","Kathakali","Garba"],
answer:"Kathakali"
},

{
question:"Who wrote Ramayana?",
options:["Kalidas","Tulsidas","Valmiki","Kabir"],
answer:"Valmiki"
},

{
question:"Which monument is in Agra?",
options:["Qutub Minar","India Gate","Taj Mahal","Gateway of India"],
answer:"Taj Mahal"
}

];

let currentQuestion = 0;

let answers = [];

function showQuestion(){

const q = questions[currentQuestion];

document.getElementById("question")
.innerText = q.question;

const optionsDiv =
document.getElementById("options");

optionsDiv.innerHTML = "";

q.options.forEach(option => {

const btn =
document.createElement("button");

btn.className = "option";

btn.innerText = option;

if(answers[currentQuestion] === option){

btn.classList.add("selected");

}

btn.onclick = () => {

answers[currentQuestion] = option;

showQuestion();

};

optionsDiv.appendChild(btn);

});

}

function nextQuestion(){

if(currentQuestion < questions.length - 1){

currentQuestion++;

showQuestion();

}

}

function prevQuestion(){

if(currentQuestion > 0){

currentQuestion--;

showQuestion();

}

}

function submitQuiz(){

let score = 0;

questions.forEach((q,index)=>{

if(answers[index] === q.answer){

score++;

}

});

document.getElementById("result")
.innerText =
"Your Score: " + score + "/" + questions.length;

}

showQuestion();

</script>

</body>
</html>
