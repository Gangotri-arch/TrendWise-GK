<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Art & Culture Quiz</title>

  <style>

    body{
      font-family: Arial, sans-serif;
      background:#f2f2f2;
      margin:0;
      padding:20px;
    }

    .quiz-container{
      max-width:800px;
      margin:auto;
      background:white;
      padding:20px;
      border-radius:12px;
      box-shadow:0 0 10px rgba(0,0,0,0.2);
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      color:#333;
    }

    #question{
      font-size:24px;
      font-weight:bold;
      margin-bottom:20px;
      color:#222;
    }

    .option{
      display:block;
      width:100%;
      padding:14px;
      margin:10px 0;
      border:none;
      border-radius:8px;
      background:#e0e0e0;
      cursor:pointer;
      text-align:left;
      font-size:17px;
      transition:0.3s;
    }

    .option:hover{
      background:#d0d0d0;
    }

    .selected{
      background:skyblue !important;
    }

    .buttons{
      margin-top:20px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }

    button{
      padding:12px 18px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      color:white;
      font-size:16px;
    }

    .prev-btn{
      background:#007bff;
    }

    .next-btn{
      background:#28a745;
    }

    .submit-btn{
      background:#dc3545;
    }

    #result{
      margin-top:25px;
      text-align:center;
      font-size:28px;
      font-weight:bold;
      color:#222;
    }

  </style>

</head>

<body>

<div class="quiz-container">

  <h1>Art & Culture Quiz</h1>

  <div id="question">

    Loading Questions...

  </div>

  <div id="options"></div>

  <div class="buttons">

    <button
    class="prev-btn"
    onclick="prevQuestion()">

      Previous

    </button>

    <button
    class="next-btn"
    onclick="nextQuestion()">

      Next

    </button>

    <button
    class="submit-btn"
    onclick="submitQuiz()">

      Submit

    </button>

  </div>

  <div id="result"></div>

</div>

<script>

const csvUrl =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTnrbtJ8lD8k8Unj8NULCyWC6Ov8uJ6OdM-L7LtlFS_y-qvDhc5Kr04y7u4RFug48xQzQ9gIyXA2oxc/pub?output=csv";

let questions = [];

let currentQuestion = 0;

let answers = [];

async function loadQuiz() {

  try {

    const response = await fetch(csvUrl);

    const data = await response.text();

    const rows =
    data.trim().split("\n").slice(1);

    questions = rows.map(row => {

      const cols = row.split(",");

      return {

        question: cols[0],

        options: [

          cols[1],
          cols[2],
          cols[3],
          cols[4]

        ],

        answer: cols[5]

      };

    });

    showQuestion();

  }

  catch(error) {

    document.getElementById("question")
    .innerText =
    "Failed To Load Questions";

    console.log(error);

  }

}

function showQuestion() {

  if(questions.length === 0){

    document.getElementById("question")
    .innerText =
    "No Questions Found";

    return;

  }

  const q = questions[currentQuestion];

  document.getElementById("question")
  .innerText = q.question;

  const optionsDiv =
  document.getElementById("options");

  optionsDiv.innerHTML = "";

  q.options.forEach(option => {

    const btn =
    document.createElement("button");

    btn.innerText = option;

    btn.className = "option";

    if(answers[currentQuestion] === option){

      btn.classList.add("selected");

    }

    btn.onclick = () => {

      answers[currentQuestion] = option;

      showQuestion();

    };

    optionsDiv.appendChild(btn);

  });

}

function nextQuestion(){

  if(currentQuestion < questions.length - 1){

    currentQuestion++;

    showQuestion();

  }

}

function prevQuestion(){

  if(currentQuestion > 0){

    currentQuestion--;

    showQuestion();

  }

}

function submitQuiz(){

  let score = 0;

  questions.forEach((q,index)=>{

    if(answers[index] === q.answer){

      score++;

    }

  });

  document.getElementById("result")
  .innerText =
  "Your Score: "
  + score +
  "/" +
  questions.length;

}

loadQuiz();

</script>

</body>

</html>
